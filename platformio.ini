; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
; env:native has no main() — it's test-only (build_src_filter restricts it to
; PidController.cpp for `pio test -e native`) and fails to link as a normal
; build target. Keep it out of the default `pio run` / IDE build.
default_envs = 4d_systems_esp32s3_gen4_r8n16

[env:4d_systems_esp32s3_gen4_r8n16]
platform = espressif32
board = 4d_systems_esp32s3_gen4_r8n16
framework = arduino
board_build.filesystem = spiffs
; Uncomment and set your port if needed:
; upload_port = /dev/cu.usbserial-*
; monitor_port = /dev/cu.usbserial-*
upload_speed = 921600
monitor_speed = 115200
build_unflags = -std=gnu++11
build_flags =
	-DBOARD_HAS_PSRAM
	-std=gnu++17
lib_deps =
	robtillaart/MAX31855@^0.6.1

[env:native]
platform = native
test_framework = unity
build_flags = -std=gnu++17
test_build_src = true
build_src_filter = -<*> +<control/PidController.cpp>
